<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starbucks Customer Order Times by Locale</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="container">
        <h1>Starbucks Customer Order Times by Locale</h1>
      </div>
    </header>

    <main class="container">
      <section class="controls" aria-label="Chart controls">
        <div class="control">
          <!-- Put filters here -->
        </div>

        <!-- <label class="control">
          <span class="label">Top N</span>
          <input id="topN" type="number" min="3" max="50" value="12" />
        </label> -->

        <div class="control meta" id="meta"></div>
      </section>

      <section class="card">
        <div id="chart" class="chart-root" role="img" aria-label="Radial stacked hourly order chart"></div>
      </section>

      <section class="card">
        <h2>Instructions</h2>
        <ul>
          <li>Radial map reads clockwise.</li>
          <li>Taller bars represent higher magnitudes. </li>
        </ul>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
